<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/web-dev-companion.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Dev Companion</title>
    <style>
      :root {
        --boot-bg: #e9eef2;
        --boot-surface: #ffffff;
        --boot-surface-soft: #f2f6f8;
        --boot-text: #17202a;
        --boot-muted: #65727d;
        --boot-brand: #235b55;
        --boot-accent: #d67b3f;
        --boot-border: #d1dbe3;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --boot-bg: #101418;
          --boot-surface: #171e24;
          --boot-surface-soft: #1b242b;
          --boot-text: #e7edf2;
          --boot-muted: #95a3ad;
          --boot-brand: #66c6b8;
          --boot-accent: #dd9b59;
          --boot-border: #2a3740;
        }
      }

      .boot-screen {
        display: grid;
        min-height: 100vh;
        place-items: center;
        overflow: hidden;
        background:
          linear-gradient(125deg, transparent 0 42%, color-mix(in srgb, var(--boot-brand) 13%, transparent) 42% 43%, transparent 43% 100%),
          linear-gradient(305deg, transparent 0 58%, color-mix(in srgb, var(--boot-accent) 12%, transparent) 58% 59%, transparent 59% 100%),
          linear-gradient(var(--boot-border) 1px, transparent 1px),
          linear-gradient(90deg, var(--boot-border) 1px, transparent 1px),
          var(--boot-bg);
        background-size:
          auto,
          auto,
          42px 42px,
          42px 42px,
          auto;
        color: var(--boot-text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .boot-card {
        position: relative;
        display: grid;
        width: min(440px, calc(100vw - 48px));
        gap: 18px;
        overflow: hidden;
        border: 1px solid var(--boot-border);
        border-radius: 12px;
        padding: 26px;
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--boot-surface) 94%, transparent), color-mix(in srgb, var(--boot-surface-soft) 88%, transparent)),
          var(--boot-surface);
        box-shadow:
          0 24px 70px color-mix(in srgb, #000000 18%, transparent),
          inset 0 1px 0 color-mix(in srgb, #ffffff 42%, transparent);
      }

      .boot-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(110deg, transparent 0 38%, color-mix(in srgb, var(--boot-brand) 16%, transparent) 48%, transparent 58% 100%);
        transform: translateX(-120%);
        animation: boot-sweep 2.4s ease-in-out infinite;
      }

      .boot-brand {
        position: relative;
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .boot-brand img {
        width: 48px;
        height: 48px;
        border-radius: 11px;
        box-shadow: 0 10px 22px color-mix(in srgb, var(--boot-brand) 22%, transparent);
      }

      .boot-brand h1 {
        margin: 0;
        font-size: 1.4rem;
        line-height: 1.1;
      }

      .boot-brand p {
        margin: 4px 0 0;
        color: var(--boot-muted);
        font-size: 0.82rem;
        font-weight: 700;
      }

      .boot-activity {
        position: relative;
        display: grid;
        gap: 10px;
      }

      .boot-track {
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: color-mix(in srgb, var(--boot-border) 58%, transparent);
      }

      .boot-track span {
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--boot-brand), var(--boot-accent));
        animation: boot-progress 1.35s ease-in-out infinite;
      }

      .boot-steps {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .boot-steps span {
        min-height: 6px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--boot-brand) 18%, var(--boot-border));
        animation: boot-pulse 1.6s ease-in-out infinite;
      }

      .boot-steps span:nth-child(2) {
        animation-delay: 160ms;
      }

      .boot-steps span:nth-child(3) {
        animation-delay: 320ms;
      }

      @keyframes boot-sweep {
        0%,
        34% {
          transform: translateX(-120%);
        }

        70%,
        100% {
          transform: translateX(120%);
        }
      }

      @keyframes boot-progress {
        0% {
          transform: translateX(-110%);
        }

        50% {
          transform: translateX(70%);
        }

        100% {
          transform: translateX(250%);
        }
      }

      @keyframes boot-pulse {
        0%,
        100% {
          opacity: 0.35;
        }

        50% {
          opacity: 1;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-card::before,
        .boot-track span,
        .boot-steps span {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-screen" aria-label="Web Dev Companion is starting">
        <section class="boot-card">
          <div class="boot-brand">
            <img src="/web-dev-companion.svg" alt="" aria-hidden="true" />
            <div>
              <h1>Web Dev Companion</h1>
              <p>Preparing your workspace</p>
            </div>
          </div>
          <div class="boot-activity" aria-hidden="true">
            <div class="boot-track"><span></span></div>
            <div class="boot-steps">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
